            echo ""
            echo "═══ PASS $PASS DONE — $TOTAL total | $(date -u +%H:%M:%S) ═══"

            # 30秒休息避免触发速率限制
            [ $((SECONDS - START)) -lt $MAX_RUNTIME ] && sleep 30
          done

          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║  HUNTER $S COMPLETE                  ║"
          echo "║  Passes: $PASS | Infected: $TOTAL    ║"
          echo "╚══════════════════════════════════════╝"

          # Keep bot alive until workflow timeout
          sleep 3600
