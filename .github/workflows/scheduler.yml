                  echo "  🧬 +$NEW | 总计: $TOTAL"
                  while read -r LINE; do
                    echo "    ✅ $LINE"
                  done < "/tmp/results_${S}.txt"
                  cat "/tmp/results_${S}.txt" >> /tmp/all_infections.txt
                fi
              fi
